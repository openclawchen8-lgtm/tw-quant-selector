services:
  app:
    container_name: app
    hostname: app
    build: .
    env_file: .env
    environment:
      - TZ=Asia/Taipei
      - PYTHONUNBUFFERED=1
      - DUCKDB_PATH=/data/tw_quant.duckdb
    volumes:
      - ./data:/data
      - ./output:/output
      - ./scripts:/app/scripts
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    container_name: frontend
    hostname: frontend
    image: node:20-alpine
    working_dir: /app/frontend
    env_file: .env
    environment:
      - TZ=Asia/Taipei
      - PYTHONUNBUFFERED=1
    volumes:
      - ./frontend:/app/frontend
      - /app/frontend/node_modules
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host"

  scheduler:
    container_name: scheduler
    hostname: scheduler
    profiles:
      - scheduler
    build: .
    command: python scripts/run_daily_pipeline.py
    env_file: .env
    environment:
      - TZ=Asia/Taipei
      - PYTHONUNBUFFERED=1
      - DUCKDB_PATH=/data/tw_quant.duckdb
    volumes:
      - ./data:/data
      - ./output:/output
      - ./scripts:/app/scripts
