version: "3.9"
services:
  app:
    build: .
    environment:
      - FINMIND_TOKEN=${FINMIND_TOKEN}
      - DUCKDB_PATH=/data/tw_quant.duckdb
    volumes:
      - ./data:/data
      - ./output:/output
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
